<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hacker Dashboard  Captured Credentials</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 30px;
  }
  .container { max-width: 1000px; margin: 0 auto; }
  header {
    border-bottom: 1px solid #334155;
    padding-bottom: 20px;
    margin-bottom: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  h1 { font-size: 24px; color: #f87171; }
  .badge {
    background: #dc2626;
    color: #fff;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: bold;
  }
  .stats {
    background: #1e293b;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    gap: 30px;
  }
  .stat-item .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; }
  .stat-item .value { font-size: 28px; color: #f87171; font-weight: bold; }
  button.refresh {
    background: #0ea5e9;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #1e293b;
    border-radius: 8px;
    overflow: hidden;
  }
  th, td {
    padding: 12px 15px;
    text-align: left;
    font-size: 14px;
    border-bottom: 1px solid #334155;
  }
  th {
    background: #0f172a;
    color: #94a3b8;
    font-size: 12px;
    text-transform: uppercase;
  }
  .password {
    font-family: monospace;
    color: #fbbf24;
    background: #44403c;
    padding: 3px 7px;
    border-radius: 3px;
  }
  .empty {
    text-align: center;
    padding: 40px;
    color: #64748b;
  }
  .notice {
    background: #422006;
    border-left: 3px solid #f59e0b;
    padding: 12px 16px;
    margin-bottom: 20px;
    border-radius: 4px;
    font-size: 13px;
    color: #fde68a;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🎣 Phishing Capture Dashboard</h1>
    <span class="badge">Demo</span>
  </header>

  <div class="notice">
    This dashboard is for the security awareness. It displays what a real attacker would see after running a phishing kit.
  </div>

  <div class="stats">
    <div class="stat-item">
      <div class="label">Credentials captured</div>
      <div class="value" id="count">0</div>
    </div>
    <div class="stat-item" style="margin-left:auto; align-self:center;">
      <button class="refresh" onclick="loadData()">↻ Refresh</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Time</th>
        <th>Email</th>
        <th>Password</th>
        <th>IP</th>
      </tr>
    </thead>
    <tbody id="rows">
      <tr><td colspan="4" class="empty">No captures yet. Submit the fake login to see it appear here.</td></tr>
    </tbody>
  </table>
</div>

<script>
async function loadData() {
  try {
    const res = await fetch('/api/captured');
    const data = await res.json();
    document.getElementById('count').textContent = data.count;
    const tbody = document.getElementById('rows');
    if (!data.entries.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">No captures yet.</td></tr>';
      return;
    }
    tbody.innerHTML = data.entries.slice().reverse().map(e => `
      <tr>
        <td>${new Date(e.timestamp).toLocaleTimeString()}</td>
        <td>${escapeHtml(e.email)}</td>
        <td><span class="password">${escapeHtml(e.password)}</span></td>
        <td>${escapeHtml(e.ip)}</td>
      </tr>
    `).join('');
  } catch (err) {
    console.error(err);
  }
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
loadData();
setInterval(loadData, 3000);
</script>
</body>
</html>
